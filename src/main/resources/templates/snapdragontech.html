<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} "></title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="mainContainer">
       <div class="header">
          <div class="header-left">
                <img th:src="@{/images/Group 8057.png}" class="lava-logo">
          </div>
          <div class="header-center">
                <input type="text" placeholder="Search" class="search-box">
          </div>

           <div class="header-right">
                <div class="user-info">
                    <span class="username" th:text="${displayName}">User Name</span>
                    <a th:href="@{/logout}" class="sign-out" style="cursor:pointer; text-decoration:none;">Sign out</a>
                </div>
                <img th:src="@{/images/Ellipse 1.png}" class="user-pic">
           </div>
        </div>

        <div class="dashboard-container">
            <div class="breadcrumb">
                <a th:href="@{/dashboard}" class="inactive">Dashboard</a>
                <span>›</span>
                <a th:href="@{/dashboard/odm}" class="inactive">All ODMs</a>
                <span>›</span>
                <a href="" class="active" th:text="${title}" >Snapdragon technology</a>
            </div>
            <div class="create-new-folder">
                 <div class="create-new-project" id="createProject">
                    <img th:src="@{/images/Folder Icon.png}">
                    <span>Create New Project</span>
                 </div>
            </div>
        </div>
    </div>
    <form th:action="@{/dashboard/odm/{name}/(name=${name})}"
          th:object="${createProject}"
          method="post">
        <div class="create_new_project" id="createNewProject">
        <div class="popup-window">
            <div class="popup-title-row">
                <p class="create-odm-title">Create Project</p>
                <span class="close-icon" id="closePopupIcon">✕</span>
            </div>
                <label>Project Name</label>
                <input type="text"
                   th:field="*{projectName}"
                   placeholder="Project Agni4"
                   required>

                <label>Chipset</label>
                <select th:field="*{chipset}"
                    id="chipset"
                    required>
                    <option value="" selected disabled>Select a Chipset</option>
                    <option th:each="c : ${chipsets}" th:value="${c.name}" th:text="${c.name}"></option>
                </select>
                <div class="popupButtons">
                    <button  type="button" class="cancelBtn" id="closePopup">Cancel</button>
                    <button type="submit" class="createBtn">Create</button>
                </div>
        </div>
    </div>
    </form>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
