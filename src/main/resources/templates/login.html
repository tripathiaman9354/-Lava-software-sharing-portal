    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LOGIN PAGE</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
    <form th:action="@{/login}" th:object="${userlogin}" method="post">
        <div class="main-container login-page">
        <div class="login-form" >
            <div class="logo">
                <img th:src="@{/images/Group 8057.png}">
            </div>
            <label>Email</label>
            <input type="text" placeholder="Abc@example.com" th:field="*{email}">
            <div class="password-row">
                <label>Password</label>
                <a th:href="@{/forgot-password}" class="forgot-password">Forgot Password?</a>
            </div>
            <input type="password" placeholder="*************" th:field="*{password}">
            <div id="errorMessage" th:text="${error}" style="color:red; font-size:14px; margin-top:8px;"></div>
            <div id="successMessage" th:text="${success}"></div>

<!--            <a href="@{/software-sharing-assets/}dashboard.html">-->
                <button  class="loginBtn">Login</button>
<!--            </a>-->
            </div>
        </div>
    </form>
    </body>
    </html>
