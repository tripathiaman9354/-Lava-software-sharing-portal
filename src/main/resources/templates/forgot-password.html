    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FORGOT PASSWORD</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
    <form th:action="@{/forgot-password}" method="post">
        <div class="main-container login-page">
        <div class="login-form" >
            <div class="logo">
                <img th:src="@{/images/Group 8057.png}">
            </div>
            <p class="form-subtitle">Enter your registered email address to reset your password.</p>
            <label>Email</label>
            <input type="email" name="email" placeholder="Abc@example.com" required>
            <div id="errorMessage" th:text="${error}"></div>

            <button class="loginBtn">Continue</button>

            <div class="back-to-login">
                <a th:href="@{/login}">Back to Login</a>
            </div>

        </div>
    </div>
    </form>
    </body>
    </html>
