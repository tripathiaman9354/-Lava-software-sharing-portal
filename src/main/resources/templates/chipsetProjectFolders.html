<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.projectName}">PROJECT AGNI 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="mainContainer">
    <div class="header">
        <div class="header-left">
            <img th:src="@{/images/Group 8057.png}" class="lava-logo">
        </div>
        <div class="header-center">
            <input type="text" placeholder="Search" class="search-box">
        </div>

        <div class="header-right">
            <div class="user-info">
                <span class="username" th:text="${displayName}">User Name</span>
                <a th:href="@{/logout}" class="sign-out" style="cursor:pointer; text-decoration:none;">Sign out</a>
            </div>
            <img th:src="@{${displayImage}}" alt="user-picture" class="user-pic">
        </div>
    </div>

    <div class="dashboard-container">
        <div class="breadcrumb">
            <a th:href="@{/dashboard}" class="inactive">Dashboard</a>
            <span>›</span>
            <a th:href="@{/dashboard/chipset}" class="inactive">Chipset</a>
            <span>›</span>
            <a th:href="@{/dashboard/chipsets/{chipset}(chipset=${chipsetName})}" class="inactive" th:text="${chipsetName}">Mediatek</a>
            <span>›</span>
            <a href="#" class="active" th:text="${project.projectName}">Project Agni 6</a>
        </div>

        <div class="project-agni-4">
            <a th:each="folder : ${folders}"
               class="official-SW odm-link"
               th:href="@{/dashboard/chipsets/{chipset}/projects/{pid}/folders/{fid}(chipset=${chipsetName},pid=${project.id},fid=${folder.id})}">
                <img th:src="@{/images/image-En0WuV9h3Cjev3oISjtJqXetnfA18d 1.png}" class="folder-icon">
                <span th:text="${folder.name}">Official SW</span>
            </a>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
