<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Dashboard 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="main_container">
       <div class="header">
          <div class="header-left">
              <img th:src="@{/images/Group 8057.png}" class="lava-logo">
          </div>
          <div class="header-center">
                <input type="text" placeholder="Search" class="search-box">
          </div>

           <div class="header-right">
                <div class="user-info">
                    <span th:text="${displayName}" class="username">User Name</span>
                    <a th:href="@{/logout}" class="sign-out" style="cursor:pointer; text-decoration:none;">Sign out</a>
                </div>
               <img th:src="@{${displayImage}}" class="user-pic">
           </div>
       </div>

        <div class="dashboard-container">
            <p>Dashboard</p>
            <div class="user-projects-list">
                <div class="projectAgni4" th:each="project : ${projects}">
                    <img th:src="@{/images/image-En0WuV9h3Cjev3oISjtJqXetnfA18d 1.png}" class="folder-icon">
                    <a th:href="@{/odmdashboard/projects/{id}(id=${project.id})}"
                       class="odm-link"
                       th:text="${project.projectName}">Project Agni 4</a>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(projects)}" style="margin-top: 30px;">No projects assigned yet.</p>
        </div>
    </div>
</body>
</html>
