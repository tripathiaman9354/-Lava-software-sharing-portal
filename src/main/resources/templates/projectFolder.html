<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.projectName}">PROJECT AGNI 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="mainContainer">
       <div class="header">
          <div class="header-left">
                <img th:src="@{/images/Group 8057.png}" class="lava-logo">
          </div>
          <div class="header-center">
                <input type="text" placeholder="Search" class="search-box">
          </div>

           <div class="header-right">
                <div class="user-info">
                    <span class="username" th:text="${displayName}">User Name</span>
                    <a th:href="@{/logout}" class="sign-out" style="cursor:pointer; text-decoration:none;">Sign out</a>
                </div>
               <img th:src="@{${displayImage}}" alt="user-picture" class="user-pic">
            </div>
        </div>

        <div class="dashboard-container">
            <div class="breadcrumb">
                <a th:href="@{/dashboard}" class="inactive">Dashboard</a>
                <span>›</span>
                <a th:href="@{/dashboard/odm}" class="inactive">All ODMs</a>
                <span>›</span>
                <a th:href="@{/dashboard/odm/{name}(name=${name})}" class="inactive" th:text="${name}">Snapdragon technology</a>
                <span>›</span>
                <a href="#" class="active" th:text="${project.projectName}">Project AGNI 4</a>
            </div>

            <div class="project-agni-4">
                <div class="official-SW odm-link" style="position:relative;" th:each="folder : ${folders}">
                    <a th:href="@{/dashboard/odm/{name}/projects/{pid}/folders/{fid}(name=${name},pid=${project.id},fid=${folder.id})}"
                       style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:8px;">
                        <img th:src="@{/images/image-En0WuV9h3Cjev3oISjtJqXetnfA18d 1.png}" class="folder-icon">
                        <span th:text="${folder.name}">Official SW</span>
                    </a>
                    <div class="dots">⋯</div>
                    <div class="menu-bar">
                        <div class="menu-item delete-folder-btn" th:attr="data-odm-name=${name},data-project-id=${project.id},data-folder-id=${folder.id}">
                            <img th:src="@{/images/delete.png}">
                            <span>Delete</span>
                        </div>
                    </div>
                </div>
            </div>
         </div>
     </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
