<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODM</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main_container">
    <div class="header">
        <div class="header-left">
            <img th:src="@{/images/Group 8057.png}" alt="lava-logo" class="lava-logo">
        </div>
        <div class="header-center">
            <input type="text" placeholder="Search" class="search-box">
        </div>

        <div class="header-right">
            <div class="user-info">
                <span class="username" th:text="${displayName}">Shivam Mehrotra</span>
                <a class="sign-out" style="cursor:pointer; text-decoration: none" th:href="@{/logout}">Sign out</a>
            </div>
            <img th:src="@{${displayImage}}" alt="user-picture" class="user-pic">
        </div>
    </div>

    <div class="dashboard-container">
        <div class="odm-header">
            <div class="breadcrumb">
                <a th:href="@{/admin-dashboard}" class="inactive">Dashboard</a>
                <span>›</span>
                <a th:href="@{/dashboard/odm}" class="active">All ODMs</a>
            </div>
            <button class="create-odm" id="openPopup"> <span>+</span> Create ODM </button>
        </div>
        <p th:if="${success}" th:text="${success}" style="color: green; margin-top: 12px;"></p>
        <p th:if="${warning}" th:text="${warning}" style="color: #b26a00; margin-top: 12px;"></p>
        <div class="odms">
            <div class="odm-card" th:each="odm : ${odms}">
                <img th:src="@{${odm.logoPath}}" class="odm-logo">
                <div class="card-content">
                    <a th:href="${odmProjectMap[odm.name]} ?
                        @{/dashboard/odm/{name}/(name=${odm.name})} :
                        @{/dashboard/odm/{name}(name=${odm.name})}"
                       class="title odm-link"
                       th:text="${odm.name}">
                    </a>

                    <p class="update-text">
                        Last Update<br>
                        <span th:text="${odm.lastUpdate != null
                        ? #temporals.format(odm.lastUpdate, 'dd-MM-yyyy')
                        : 'N/A'}">05-10-2025
                        </span>
                    </p>
                    <div class="dots">⋯</div>
                    <div class="menu-bar">
                        <div class="menu-item rename-btn" th:attr="data-name=${odm.name},data-type='odm'">
                            <img th:src="@{/images/edit.png}">
                            <span>Rename</span>
                        </div>
                        <div class="menu-item delete-btn" th:attr="data-name=${odm.name},data-type='odm'">
                            <img th:src="@{/images/delete.png}">
                            <span>Delete</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="popup-odm-create" id="popup-odm">
    <div class="popup-win">
        <form th:action="@{/odm/create}"
              th:object="${odm}"
              method="post"
              enctype="multipart/form-data">
            <div class="popup-title-row">
                <p class="create-odm-title">Create ODM</p>
                <span class="close-icon" id="closePopupIcon">✕</span>
            </div>
            <label>ODM Name</label>
            <input id="odmName" type="text" th:field="*{name}" placeholder="Abc Company" required
                   oninput="this.setCustomValidity('')">
            <input type="hidden"
                   id="odmNameError"
                   th:if="${nameError}"
                   th:value="${nameError}">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="Abc@example.com" required>
            <input type="hidden"
                   id="odmEmailError"
                   th:if="${emailError}"
                   th:value="${emailError}">
            <label>Contact Person</label>
            <input type="text" th:field="*{contactPerson}" placeholder="Ricardo">
            <label>ODM Logo</label>
            <input type="file" name="logoFile" accept="image/*">
            <div class="popupButtons">
                <button type="button" class="cancelBtn" id="closePopup">Cancel</button>
                <button type="submit" class="createBtn">Create</button>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
