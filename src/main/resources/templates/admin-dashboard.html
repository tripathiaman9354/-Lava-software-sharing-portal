<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main_container">
    <div class="header">
        <div class="header-left">
            <img th:src="@{/images/Group 8057.png}" class="lava-logo">
        </div>
        <div class="header-center">
            <input type="text" placeholder="Search" class="search-box">
        </div>

        <div class="header-right">
            <div class="user-info">
                <span class="username" th:text="${displayName}">User Name</span>
                <a th:href="@{/logout}" class="sign-out" style="cursor:pointer; text-decoration:none;">Sign out</a>
            </div>
            <img th:src="@{/images/Ellipse 1.png}" class="user-pic">
        </div>
    </div>

    <div class="dashboard-container">
        <p>Dashboard</p>
        <div class="files">
            <a th:href="@{/dashboard/odm}" class="file-link">
                <div class="development">
                    <img th:src="@{/images/image-Ql4CLJJZKsPhAqYytC4Z57x3JhdZOY 1 (1).png}">
                    <p>Development</p>
                </div>
            </a>
            <a th:href="@{/dashboard/chipset}" class="file-link">
                <div class="production">
                    <img th:src="@{/images/image-Ql4CLJJZKsPhAqYytC4Z57x3JhdZOY .png}">
                    <p>Production</p>
                </div>
            </a>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
