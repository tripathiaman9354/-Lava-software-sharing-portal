    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VERIFY OTP</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
    <div class="main-container login-page">
        <div class="login-form">
            <div class="logo">
                <img th:src="@{/images/Group 8057.png}">
            </div>
            <p class="form-subtitle">Enter the 6-digit OTP sent to your registered email.</p>

            <form th:action="@{/verify-otp}" method="post">
                <label>OTP</label>
                <input type="text" name="otp" maxlength="6" placeholder="Enter OTP" required>
                <div id="errorMessage" th:text="${error}"></div>
                <div id="successMessage" th:text="${success}"></div>

                <button class="loginBtn">Verify OTP</button>
            </form>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <div class="back-to-login">
                    <a th:href="@{/login}">Back to Login</a>
                </div>

                <form th:action="@{/resend-otp}" method="post" style="margin:0;">
                    <button type="submit" style="background:none;border:none;padding:0;color:#666;text-decoration:underline;cursor:pointer;font-size:14px;">
                        Resend OTP
                    </button>
                </form>
            </div>
        </div>
    </div>
    </body>
    </html>
