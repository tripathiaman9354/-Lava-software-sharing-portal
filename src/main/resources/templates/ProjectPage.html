<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT AGNI 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="mainContainer">
    <div class="header">
        <div class="header-left">
            <img th:src="@{/images/Group 8057.png}" class="lava-logo">
        </div>
        <div class="header-center">
            <input type="text" placeholder="Search" class="search-box">
        </div>

        <div class="header-right">
            <div class="user-info">
                <span class="username" th:text="${displayName}">User Name</span>
                <a th:href="@{/logout}" class="sign-out" style="cursor:pointer; text-decoration:none;">Sign out</a>
            </div>
            <img th:src="@{${displayImage}}" alt="user-picture" class="user-pic">
        </div>
    </div>

    <div class="dashboard-container">
        <div class="breadcrumb">
            <a th:href="@{/odmdashboard}" class="inactive">Dashboard</a>
            <span>›</span>
            <a href="" class="active" th:text="${project.projectName}">Project AGNI 4</a>
        </div>

        <div class="project-agni-4" id="">
            <div class="official-SW" th:each="folder : ${folders}">
                <img th:src="@{/images/image-En0WuV9h3Cjev3oISjtJqXetnfA18d 1.png}" class="folder-icon">
                <a th:href="@{/odmdashboard/projects/{id}/uploadfiles(id=${folder.id})}"
                   class="odm-link"
                   th:text="${folder.name}">Official SW</a>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
